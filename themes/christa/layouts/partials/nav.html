<script>
(function(){
  var t = document.getElementById('nav-toggle');
  var n = document.getElementById('site-nav');
  if (!t || !n) return;
  t.addEventListener('click', function(){
    var open = n.classList.toggle('nav--open');
    t.setAttribute('aria-expanded', open ? 'true' : 'false');
    t.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
  });

  var drops = n.querySelectorAll('.nav__drop-btn');
  function closeAll(except){
    drops.forEach(function(b){
      if (b === except) return;
      b.setAttribute('aria-expanded', 'false');
      b.parentElement.classList.remove('open');
    });
  }
  drops.forEach(function(b){
    b.addEventListener('click', function(e){
      e.stopPropagation();
      var open = b.getAttribute('aria-expanded') === 'true';
      closeAll(b);
      b.setAttribute('aria-expanded', open ? 'false' : 'true');
      b.parentElement.classList.toggle('open', !open);
    });
  });
  document.addEventListener('click', function(e){
    if (!n.contains(e.target)) closeAll();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') { closeAll(); n.classList.remove('nav--open'); t.setAttribute('aria-expanded','false'); }
  });
  n.querySelectorAll('.nav__dropdown a, .nav__links > li > a').forEach(function(a){
    a.addEventListener('click', function(){
      n.classList.remove('nav--open');
      t.setAttribute('aria-expanded','false');
      closeAll();
    });
  });
})();
</script>
