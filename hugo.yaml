baseURL: "https://christaburger.com"
languageCode: "en-us"
title: "Christa Burger"
enableRobotsTXT: true
theme: "christa"

params:
  tagline: "Governance for the world that actually exists."
  subtagline: "Build systems people can trust."
  description: "Christa Burger builds operating systems for real life — household systems, AI with a job description, governance, and leadership — so the system carries the repetition and the humans carry the meaning."
  author: "Christa Burger"
  email: "christa@christaburger.com"

  proofbar:
    - "20 Years Cybersecurity Governance"
    - "VP of Cybersecurity"
    - "Author, The Automated Household"
    - "Household of Seven, Actually Running"
    - "AI With a Job Description"

  services:
    - title: "Household Operating Systems"
      icon: "✦"
      url: "/automated-household/"
      link_label: "Tour the Household →"
      description: "Care loops, defaults, a source of truth, and Hard-Week Mode: a home that knows how to recover, built for the actual humans who live there."
    - title: "AI at the Right Layer"
      icon: "◈"
      url: "/automated-household/stable-system/"
      link_label: "Meet the Helpers →"
      description: "Not one giant assistant — an articulate junk drawer — but small helpers with job descriptions. AI prepares. Humans decide."
    - title: "Governance & Trust Architecture"
      icon: "⊕"
      url: "/work-with-me"
      link_label: "The Day Job →"
      description: "The day job: decision systems, risk clarity, and customer trust for organizations where the stakes are real. Governance is not bureaucracy. It's clarity."
    - title: "Leadership That Starts Where You Live"
      icon: "❖"
      url: "/leadership-work-life"
      link_label: "Leadership at Home →"
      description: "Decision rights, done states, and escalation that works at a kitchen table — because if clarity can survive dinner, five dogs, and a family calendar, it can survive a boardroom."

# Top-level IA: Ideas · Work · Book · About · Contact
# (Dropdown children live in partials/nav.html for accessible disclosure markup.)
menu:
  main:
    - name: "Ideas"
      url: "/blog"
      weight: 1
    - name: "Work"
      url: "/work-with-me"
      weight: 2
    - name: "Book"
      url: "/book"
      weight: 3
    - name: "About"
      url: "/about"
      weight: 4
    - name: "Contact"
      url: "/contact"
      weight: 5

outputs:
  home: ["HTML", "RSS", "sitemap"]
  section: ["HTML", "RSS"]
  taxonomy: ["HTML"]
  term: ["HTML", "RSS"]

taxonomies:
  tag: "tags"
  category: "categories"
  series: "series"

related:
  includeNewer: true
  threshold: 40
  toLower: true
  indices:
    - name: "tags"
      weight: 80
    - name: "series"
      weight: 60
    - name: "categories"
      weight: 40

markup:
  goldmark:
    renderer:
      unsafe: true
